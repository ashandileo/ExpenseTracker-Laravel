# fly.toml — https://fly.io/docs/reference/configuration/

app = 'expense-tracker'
primary_region = 'sin'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[mounts]
  source = 'data'
  destination = '/data'

[env]
  APP_ENV = 'production'
  APP_DEBUG = 'false'
  DB_CONNECTION = 'sqlite'
  LOG_CHANNEL = 'stderr'
